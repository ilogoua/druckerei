<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lab 2</title>
</head>
<body>

<button id="btnA">Кнопка A</button>
<button id="btnB">Кнопка B</button>

<script>
"use strict";

// 1️⃣ Объявляем функцию
function sayHello()  {
  console.log ("Привет! Функция выполнена.");
}

// 2️⃣ Вариант 1 — передаём функцию (БЕЗ скобок)
document.getElementById("btnA")
  .addEventListener("click", sayHello);

// 3️⃣ Вариант 2 — вызываем функцию (СО скобками)
document.getElementById("btnB")
  .addEventListener("click", sayHello);

</script>

</body>
</html>
